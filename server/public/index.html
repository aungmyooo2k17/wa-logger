<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA-Logger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534', 900:'#14532d' },
            sidebar: '#111827',
            surface: { light:'#ffffff', dark:'#1e1e2e' },
            panel: { light:'#f9fafb', dark:'#181825' },
          }
        }
      }
    }
  </script>
  <script>
    // Apply saved theme immediately to prevent flash
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    .prose h1,.prose h2,.prose h3,.prose h4{font-weight:600;margin-top:1.2em;margin-bottom:0.4em}
    .prose h3{font-size:1.15rem} .prose h4{font-size:1rem}
    .prose p{margin:0.4em 0} .prose ul,.prose ol{margin:0.3em 0;padding-left:1.5em}
    .prose li{margin:0.15em 0} .prose table{width:100%;border-collapse:collapse;margin:0.8em 0;font-size:0.875rem}
    .prose th,.prose td{border:1px solid #e5e7eb;padding:0.4rem 0.75rem;text-align:left}
    .prose th{background:#f9fafb;font-weight:600} .prose hr{margin:1em 0;border-color:#e5e7eb}
    .prose blockquote{border-left:3px solid #22c55e;padding-left:1em;margin:0.5em 0;color:#4b5563}
    .prose code{background:#f3f4f6;padding:0.1em 0.3em;border-radius:3px;font-size:0.85em}
    /* Dark mode prose */
    .dark .prose th,.dark .prose td{border-color:#374151}
    .dark .prose th{background:#1f2937}
    .dark .prose hr{border-color:#374151}
    .dark .prose blockquote{color:#9ca3af}
    .dark .prose code{background:#1f2937;color:#d1d5db}
    .dark .prose{color:#d1d5db}
    /* Dark mode: cards, panels, inputs, tables */
    .dark .bg-white{background-color:#1e1e2e !important}
    .dark .bg-gray-50{background-color:#181825 !important}
    .dark .border-gray-200{border-color:#313244 !important}
    .dark .border-gray-100{border-color:#282838 !important}
    .dark .border-gray-300{border-color:#45475a !important}
    .dark .text-gray-900{color:#cdd6f4 !important}
    .dark .text-gray-800{color:#bac2de !important}
    .dark .text-gray-700{color:#a6adc8 !important}
    .dark .text-gray-600{color:#9399b2 !important}
    .dark .text-gray-500{color:#7f849c !important}
    .dark .text-gray-400{color:#6c7086 !important}
    .dark input, .dark select{background-color:#1e1e2e;color:#cdd6f4;border-color:#45475a}
    .dark input:focus, .dark select:focus{border-color:#22c55e}
    .dark .bg-gray-100{background-color:#1e1e2e !important}
    .dark .bg-green-100{background-color:#1e3a2f !important} .dark .text-green-800{color:#a6e3a1 !important}
    .dark .bg-amber-100{background-color:#3a2e1e !important} .dark .text-amber-800{color:#f9e2af !important}
    .dark .bg-blue-100{background-color:#1e2e3a !important} .dark .text-blue-800{color:#89b4fa !important}
    .dark .bg-purple-100{background-color:#2e1e3a !important} .dark .text-purple-800{color:#cba6f7 !important}
    .log-output{font-family:ui-monospace,monospace;font-size:0.8rem;line-height:1.4}
    .fade-in{animation:fadeIn 0.2s ease-in} @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    [x-cloak]{display:none!important}
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-[#11111b] dark:text-gray-100">
<div id="app" class="flex h-full">

  <!-- Sidebar -->
  <aside class="w-64 bg-sidebar dark:bg-[#0d0d14] flex flex-col flex-shrink-0 h-screen sticky top-0">
    <div class="px-5 py-5 border-b border-gray-700 dark:border-gray-800">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
            <svg class="w-4.5 h-4.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          </div>
          <div>
            <h1 class="text-white font-semibold text-sm leading-tight">WA-Logger</h1>
            <p class="text-gray-400 text-xs">Dashboard</p>
          </div>
        </div>
        <button onclick="toggleDarkMode()" id="theme-toggle" class="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" title="Toggle dark mode">
          <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto py-3 px-3">
      <div class="mb-1">
        <button onclick="showView('overview')" id="nav-overview"
          class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
          <svg class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          Overview
        </button>
      </div>
      <div class="mb-1">
        <button onclick="showView('pipeline')" id="nav-pipeline"
          class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
          <svg class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Pipeline
        </button>
      </div>
      <div class="mb-1">
        <button onclick="showView('settings')" id="nav-settings"
          class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors">
          <svg class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
          Settings
        </button>
      </div>

      <div class="mt-5 mb-2 px-3">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Groups</p>
      </div>
      <div id="sidebar-groups"></div>
    </nav>

    <!-- Pipeline status indicator -->
    <div id="sidebar-pipeline-badge" class="hidden px-5 py-3 border-t border-gray-700 dark:border-gray-800">
      <div class="flex items-center gap-2">
        <span class="relative flex h-2.5 w-2.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-500 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-500"></span></span>
        <span class="text-xs text-gray-400">Pipeline running...</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto h-screen bg-gray-50 dark:bg-[#11111b]">
    <!-- Overview -->
    <div id="view-overview" class="view p-8 fade-in">
      <div class="max-w-5xl">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Overview</h2>
        <p class="text-gray-500 mt-1 mb-6">All your WhatsApp groups at a glance</p>
        <div id="overview-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

        <div class="mt-10">
          <h3 class="text-lg font-semibold text-gray-700 mb-3">Unconfigured Groups</h3>
          <div id="detected-groups-container"></div>
        </div>
      </div>
    </div>

    <!-- Pipeline -->
    <div id="view-pipeline" class="view hidden p-8 fade-in">
      <div class="max-w-3xl">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Pipeline</h2>
        <p class="text-gray-500 mt-1 mb-6">Run the daily summarization pipeline</p>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
          <div class="flex items-end gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
              <input type="date" id="pipeline-date" class="block rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
            </div>
            <button id="run-pipeline-btn" onclick="runPipeline()"
              class="inline-flex items-center gap-2 px-5 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Run Pipeline
            </button>
          </div>
          <div id="pipeline-log-section" class="hidden mt-6">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-gray-700">Output</span>
              <span id="pipeline-status-text" class="text-xs text-gray-500"></span>
            </div>
            <div id="pipeline-log" class="log-output bg-gray-900 text-green-400 rounded-lg p-4 max-h-96 overflow-y-auto whitespace-pre-wrap"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div id="view-settings" class="view hidden p-8 fade-in">
      <div class="max-w-3xl">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Settings</h2>
        <p class="text-gray-500 mt-1 mb-6">Configure global settings</p>

        <form id="settings-form" onsubmit="saveSettings(event)" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
          <div class="grid grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Whisper Command</label><input type="text" name="whisperCommand" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Whisper Model</label><input type="text" name="whisperModel" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
          </div>
          <div class="grid grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Ollama URL</label><input type="text" name="ollamaUrl" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Vision Model</label><input type="text" name="ollamaVisionModel" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
          </div>
          <div class="grid grid-cols-2 gap-5">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Server Port</label><input type="number" name="serverPort" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label><input type="text" name="timezone" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"></div>
          </div>
          <div class="pt-2">
            <button type="submit" class="px-5 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors">Save Settings</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Group Detail (dynamically shown) -->
    <div id="view-group" class="view hidden p-8 fade-in">
      <div class="max-w-5xl">
        <!-- Group Header -->
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 id="group-title" class="text-2xl font-bold text-gray-900"></h2>
            <div id="group-meta" class="flex items-center gap-3 mt-1.5"></div>
          </div>
          <button onclick="showGroupSettings()" class="text-gray-400 hover:text-gray-600 transition-colors p-1">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <!-- Stat Cards -->
        <div id="group-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

        <!-- Tabs: Summaries / Purchases / Settings -->
        <div class="border-b border-gray-200 mb-6">
          <nav class="flex gap-6">
            <button onclick="showGroupTab('summaries')" id="gtab-summaries" class="group-tab pb-3 text-sm font-medium border-b-2 border-brand-600 text-brand-700">Summaries</button>
            <button onclick="showGroupTab('purchases')" id="gtab-purchases" class="group-tab pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">Purchases</button>
            <button onclick="showGroupTab('group-config')" id="gtab-group-config" class="group-tab pb-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">Configuration</button>
          </nav>
        </div>

        <!-- Summaries Tab -->
        <div id="group-tab-summaries" class="group-tab-content">
          <div id="group-summaries-list" class="space-y-5"></div>
          <div id="group-summaries-empty" class="hidden text-center py-12">
            <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
            <p class="text-gray-400 text-sm">No summaries yet. Run the pipeline to generate.</p>
          </div>
        </div>

        <!-- Purchases Tab -->
        <div id="group-tab-purchases" class="group-tab-content hidden">
          <div id="group-purchases-totals" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>
          <div id="group-purchases-table"></div>
          <div id="group-purchases-empty" class="hidden text-center py-12">
            <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
            <p class="text-gray-400 text-sm">No purchases tracked for this group.</p>
          </div>
        </div>

        <!-- Config Tab -->
        <div id="group-tab-group-config" class="group-tab-content hidden">
          <div class="bg-white rounded-xl border border-gray-200 p-6" id="group-config-form-container"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ============ STATE ============
let groups = [];
let currentGroup = null;
let pipelinePolling = null;

// ============ NAVIGATION ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('bg-gray-800','text-white'); n.classList.add('text-gray-300'); });
  document.querySelectorAll('.group-nav-item').forEach(n => { n.classList.remove('bg-gray-800','text-white'); n.classList.add('text-gray-300'); });

  const viewEl = document.getElementById('view-' + name);
  if (viewEl) { viewEl.classList.remove('hidden'); viewEl.classList.add('fade-in'); }
  const navEl = document.getElementById('nav-' + name);
  if (navEl) { navEl.classList.add('bg-gray-800','text-white'); navEl.classList.remove('text-gray-300'); }

  if (name === 'overview') loadOverview();
  if (name === 'pipeline') initPipeline();
  if (name === 'settings') loadSettingsForm();
}

function showGroupView(slug) {
  currentGroup = groups.find(g => g.slug === slug);
  if (!currentGroup) return;

  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('bg-gray-800','text-white'); n.classList.add('text-gray-300'); });
  document.querySelectorAll('.group-nav-item').forEach(n => { n.classList.remove('bg-gray-800','text-white'); n.classList.add('text-gray-300'); });

  const el = document.getElementById('view-group');
  el.classList.remove('hidden');
  el.classList.add('fade-in');

  const navEl = document.getElementById('gnav-' + slug);
  if (navEl) { navEl.classList.add('bg-gray-800','text-white'); navEl.classList.remove('text-gray-300'); }

  document.getElementById('group-title').textContent = currentGroup.displayName;

  const templateLabels = { 'expense-tracker':'Expense Tracker', 'business-summary':'Business', 'social-highlights':'Social' };
  const templateColors = { 'expense-tracker':'bg-amber-100 text-amber-800', 'business-summary':'bg-blue-100 text-blue-800', 'social-highlights':'bg-purple-100 text-purple-800' };

  document.getElementById('group-meta').innerHTML = `
    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${currentGroup.active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'}">${currentGroup.active ? 'Active' : 'Inactive'}</span>
    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${templateColors[currentGroup.template] || 'bg-gray-100 text-gray-800'}">${templateLabels[currentGroup.template] || currentGroup.template}</span>
    <span class="text-xs text-gray-400">${currentGroup.language?.toUpperCase()} ${currentGroup.currency ? '/ ' + currentGroup.currency : ''}</span>
  `;

  showGroupTab('summaries');
  loadGroupStats(slug);
  loadGroupSummaries(slug);
}

function showGroupTab(tab) {
  document.querySelectorAll('.group-tab').forEach(t => { t.classList.remove('border-brand-600','text-brand-700'); t.classList.add('border-transparent','text-gray-500'); });
  document.querySelectorAll('.group-tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById('gtab-' + tab)?.classList.add('border-brand-600','text-brand-700');
  document.getElementById('gtab-' + tab)?.classList.remove('border-transparent','text-gray-500');
  document.getElementById('group-tab-' + tab)?.classList.remove('hidden');

  if (tab === 'purchases' && currentGroup) loadGroupPurchases(currentGroup.slug);
  if (tab === 'group-config' && currentGroup) loadGroupConfig(currentGroup.slug);
}

function showGroupSettings() { showGroupTab('group-config'); }

// ============ SIDEBAR ============
async function loadGroups() {
  groups = await fetch('/api/groups').then(r => r.json());
  const el = document.getElementById('sidebar-groups');
  el.innerHTML = groups.map(g => `
    <button onclick="showGroupView('${g.slug}')" id="gnav-${g.slug}"
      class="group-nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors mb-0.5">
      <span class="w-2 h-2 rounded-full flex-shrink-0 ${g.active ? 'bg-brand-500' : 'bg-gray-600'}"></span>
      <span class="truncate">${g.displayName}</span>
    </button>
  `).join('');
}

// ============ OVERVIEW ============
async function loadOverview() {
  const container = document.getElementById('overview-cards');
  container.innerHTML = groups.map(g => `
    <button onclick="showGroupView('${g.slug}')" class="text-left bg-white rounded-xl border border-gray-200 p-5 hover:border-brand-300 hover:shadow-md transition-all group">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-900 group-hover:text-brand-700 transition-colors">${g.displayName}</h3>
        <span class="w-2.5 h-2.5 rounded-full ${g.active ? 'bg-green-400' : 'bg-gray-300'}"></span>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600">${g.template}</span>
        <span class="text-xs text-gray-400">${g.language?.toUpperCase()}${g.currency ? ' / ' + g.currency : ''}</span>
      </div>
      <div id="overview-stats-${g.slug}" class="mt-3 text-xs text-gray-400"></div>
    </button>
  `).join('');

  // Load stats for each group
  for (const g of groups) {
    fetch(`/api/groups/${g.slug}/stats`).then(r => r.json()).then(stats => {
      const el = document.getElementById('overview-stats-' + g.slug);
      if (el) {
        const parts = [];
        if (stats.messageCount) parts.push(`${stats.messageCount} msgs`);
        if (stats.summaryCount) parts.push(`${stats.summaryCount} summaries`);
        if (stats.purchaseCount) parts.push(`${stats.purchaseCount} purchases`);
        el.textContent = parts.join(' / ') || 'No data yet';
      }
    });
  }

  // Detected groups
  const detected = await fetch('/api/detected-groups').then(r => r.json());
  const dEl = document.getElementById('detected-groups-container');
  if (detected.length === 0) {
    dEl.innerHTML = '<p class="text-sm text-gray-400">No unconfigured groups detected.</p>';
  } else {
    dEl.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-50 text-left"><th class="px-4 py-2.5 font-medium text-gray-600">Group</th><th class="px-4 py-2.5 font-medium text-gray-600">Messages</th><th class="px-4 py-2.5"></th></tr></thead>
          <tbody>${detected.map(g => `
            <tr class="border-t border-gray-100">
              <td class="px-4 py-2.5"><span class="font-medium">${g.groupName || 'Unknown'}</span><br><span class="text-xs text-gray-400">${g.jid}</span></td>
              <td class="px-4 py-2.5 text-gray-500">${g.messageCount}</td>
              <td class="px-4 py-2.5 text-right"><button onclick="addGroup('${g.jid}','${(g.groupName||'').replace(/'/g,"\\'")}')" class="text-brand-600 hover:text-brand-800 text-sm font-medium">Add</button></td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>`;
  }
}

async function addGroup(jid, name) {
  const slug = prompt('Slug (e.g. "work-team"):', name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,''));
  if (!slug) return;
  const displayName = prompt('Display name:', name) || slug;
  const template = prompt('Template (expense-tracker, business-summary, social-highlights):', 'social-highlights');
  const language = prompt('Language (en, zh, th, ms, yue):', 'en');
  const currency = prompt('Currency (USD, SGD, THB, MYR, etc.):', 'USD');
  await fetch('/api/groups', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({jid,slug,displayName,template,language,currency}) });
  await loadGroups();
  loadOverview();
}

// ============ GROUP DETAIL ============

    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-4">

async function loadGroupSummaries(slug) {
  const summaries = await fetch(`/api/groups/${slug}/summaries`).then(r => r.json());
  const listEl = document.getElementById('group-summaries-list');
  const emptyEl = document.getElementById('group-summaries-empty');

  if (summaries.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = summaries.map(s => `
    <article class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="px-6 py-3 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
        <span class="font-medium text-sm text-gray-700">${s.date}</span>

    fetch(`/api/groups/${slug}/purchases/totals`).then(r => r.json()),

  const emptyEl = document.getElementById('group-purchases-empty');
  const totalsEl = document.getElementById('group-purchases-totals');
  const tableEl = document.getElementById('group-purchases-table');

  if (purchases.length === 0) {
    totalsEl.innerHTML = '';
    tableEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  totalsEl.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Total Spent</p>
      <p class="text-2xl font-bold text-gray-900 mt-1">${totals.totalAmount.toLocaleString(undefined,{minimumFractionDigits:2})} <span class="text-sm font-normal text-gray-500">${totals.currency}</span></p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Items</p>
      <p class="text-2xl font-bold text-gray-900 mt-1">${totals.totalItems}</p>
    </div>
    ${Object.keys(totals.byPerson||{}).length > 0 ? `
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">By Person</p>
      ${Object.entries(totals.byPerson).map(([name,amt]) => `
        <div class="flex justify-between text-sm"><span class="text-gray-600">${name}</span><span class="font-medium">${amt.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>
      `).join('')}
    </div>` : ''}
  `;

  tableEl.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-gray-50 text-left">
          <th class="px-4 py-2.5 font-medium text-gray-600">Date</th>
          <th class="px-4 py-2.5 font-medium text-gray-600">Item</th>
          <th class="px-4 py-2.5 font-medium text-gray-600 text-right">Amount</th>
          <th class="px-4 py-2.5 font-medium text-gray-600">Paid By</th>
          <th class="px-4 py-2.5 font-medium text-gray-600">Split</th>
          <th class="px-4 py-2.5 font-medium text-gray-600">Source</th>
        </tr></thead>
        <tbody>${purchases.map(p => `
          <tr class="border-t border-gray-100">
            <td class="px-4 py-2.5 text-gray-500">${p.date||''}</td>
            <td class="px-4 py-2.5 font-medium text-gray-800">${p.item||''}</td>
            <td class="px-4 py-2.5 text-right font-medium">${(p.amount||0).toLocaleString(undefined,{minimumFractionDigits:2})} <span class="text-gray-400 text-xs">${p.currency||''}</span></td>
            <td class="px-4 py-2.5 text-gray-600">${p.paidBy||''}</td>
            <td class="px-4 py-2.5 text-gray-500 text-xs">${(p.splitAmong||[]).join(', ')}</td>
            <td class="px-4 py-2.5"><span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600">${p.source||''}</span></td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
}

async function updateGroup(slug, field, value) {
  await fetch(`/api/groups/${slug}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({[field]:value}) });
  await loadGroups();
  if (field === 'displayName') {
    document.getElementById('group-title').textContent = value;
    currentGroup.displayName = value;
  }
}

async function updateGroupFeature(slug, feature, value) {
  const group = await fetch(`/api/groups/${slug}`).then(r => r.json());
  const features = { ...group.features, [feature]: value };
  await updateGroup(slug, 'features', features);
}

// ============ PIPELINE ============
function initPipeline() {
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  document.getElementById('pipeline-date').value = yesterday;
}

async function runPipeline() {
  const date = document.getElementById('pipeline-date').value;
  if (!date) return;
  const btn = document.getElementById('run-pipeline-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Running...';

  const res = await fetch(`/api/pipeline/run?date=${date}`, {method:'POST'});
  const data = await res.json();
  if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = 'Run Pipeline'; return; }

  document.getElementById('pipeline-log-section').classList.remove('hidden');
  document.getElementById('pipeline-log').textContent = 'Starting...';
  document.getElementById('sidebar-pipeline-badge').classList.remove('hidden');

  pipelinePolling = setInterval(async () => {
    const status = await fetch('/api/pipeline/status').then(r => r.json());
    document.getElementById('pipeline-log').textContent = status.log || 'Waiting...';
    document.getElementById('pipeline-log').scrollTop = 99999;
    document.getElementById('pipeline-status-text').textContent = status.running ? 'Running...' : 'Complete';
    if (!status.running) {
      clearInterval(pipelinePolling);
      btn.disabled = false;
      btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Run Pipeline';
      document.getElementById('sidebar-pipeline-badge').classList.add('hidden');
    }
  }, 2000);
}

// ============ SETTINGS ============
async function loadSettingsForm() {
  const settings = await fetch('/api/settings').then(r => r.json());
  const form = document.getElementById('settings-form');
  for (const [key,val] of Object.entries(settings)) {
    const input = form.querySelector(`[name="${key}"]`);
    if (input) input.value = val;
  }
}

async function saveSettings(e) {
  e.preventDefault();
  const data = {};
  new FormData(e.target).forEach((v,k) => { data[k] = k==='serverPort' ? Number(v) : v; });
  await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  // Quick flash feedback
  const btn = e.target.querySelector('button[type="submit"]');
  btn.textContent = 'Saved!';
  setTimeout(() => btn.textContent = 'Save Settings', 1500);
}

// ============ UTILS ============
function getDayOfWeek(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
}

// ============ DARK MODE ============
function toggleDarkMode() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  updateThemeIcons();
}

function updateThemeIcons() {
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
  document.getElementById('icon-moon').classList.toggle('hidden', isDark);
}

// ============ INIT ============
updateThemeIcons();
loadGroups().then(() => showView('overview'));
</script>
